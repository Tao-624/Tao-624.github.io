        :root {
            --primary: #ff6b9d;
            --primary-dark: #e91e63;
            --primary-light: #ffc1d4;
            --secondary: #ff9a9e;
            --accent: #ffecd2;
            --dark: #4a4a4a;
            --light: #fff5f7;
            --gray: #888;
            --gradient: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
            --gradient-pink: linear-gradient(135deg, #ffc1d4 0%, #ff6b9d 50%, #ff9a9e 100%);
            --gradient-light: linear-gradient(135deg, #fff5f7 0%, #ffe4ec 100%);
            --gradient-hero: linear-gradient(135deg, #fff0f3 0%, #ffe4ec 30%, #ffd6e0 60%, #ffc8d6 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans SC', 'Poppins', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 樱花飘落动画 */
        .sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            overflow: hidden;
        }

        .sakura {
            position: absolute;
            top: -50px;
            animation: fall linear infinite;
            opacity: 0.9;
        }

        .sakura::before {
            content: '🌸';
            font-size: var(--size, 20px);
            display: block;
            animation: sway ease-in-out infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        @keyframes sway {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(15px) rotate(10deg); }
            75% { transform: translateX(-15px) rotate(-10deg); }
        }

        .petal {
            position: absolute;
            top: -20px;
            width: 12px;
            height: 12px;

            border-radius: 50% 0 50% 50%;
            animation: petalFall linear infinite;
            opacity: 0.8;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.3);
        }
